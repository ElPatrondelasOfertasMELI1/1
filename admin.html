<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
Dashboard Admin PRO
</title>


<link rel="stylesheet" href="style.css">


</head>


<body>



<header class="adminHeader">


<div class="logo">

⚡ ADMIN

<span>
EL PATRÓN
</span>

</div>



<button id="salir">

Salir

</button>


</header>






<section class="dashboard">



<h1>
🚀 Panel PRO
</h1>




<div class="stats">



<div class="cardStat">

<h3>
🔥 Ofertas
</h3>

<strong id="totalOfertas">
0
</strong>

</div>





<div class="cardStat">

<h3>
👁️ Clics
</h3>

<strong id="totalClicks">
0
</strong>

</div>






<div class="cardStat">

<h3>
🟢 Estado
</h3>

<strong>
Activo
</strong>

</div>



</div>








<div class="panel">



<h2>
➕ Nueva Oferta
</h2>



<input id="titulo"
placeholder="Título">



<input id="imagen"
placeholder="Imagen URL">



<input id="precioAntes"
placeholder="Precio antes">



<input id="precioFinal"
placeholder="Precio final">



<input id="descuento"
placeholder="Descuento">



<input id="link"
placeholder="Link Mercado Libre">





<button id="publicar">

🔥 PUBLICAR

</button>



</div>







<h2>
📦 Ofertas publicadas
</h2>



<div id="listaOfertas">

Cargando...

</div>


<div id="editor" class="panel" style="display:none;">


<h2>
✏️ Editar Oferta
</h2>


<input id="editTitulo" placeholder="Título">


<input id="editImagen" placeholder="Imagen">


<input id="editPrecioAntes" placeholder="Precio antes">


<input id="editPrecioFinal" placeholder="Precio final">


<input id="editDescuento" placeholder="Descuento">


<input id="editLink" placeholder="Link">



<button id="guardarCambios">

💾 GUARDAR CAMBIOS

</button>


</div>





<script type="module" src="admin.js"></script>


</body>

</html>
