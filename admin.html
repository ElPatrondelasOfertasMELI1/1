<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin PRO | El Patrón de las Ofertas</title>


<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet">


<link rel="stylesheet" href="admin.css">


</head>


<body>


<div class="app">


<!-- MENU LATERAL -->

<aside class="sidebar">


<div class="brand">

<div class="logo">
⚡
</div>


<h2>
El Patrón
</h2>


<span>
ADMIN PRO
</span>


</div>



<button class="menuItem activo">
🏠 Dashboard
</button>


<button class="menuItem">
🛒 Ofertas
</button>


<button class="menuItem">
🎟️ Cupones
</button>


<button class="menuItem">
📊 Estadísticas
</button>



<button id="salir">
🚪 Salir
</button>


</aside>





<!-- CONTENIDO -->


<main class="contenido">



<header class="topbar">

<h1>
Panel PRO
</h1>

<p>
Centro de control de ofertas
</p>

</header>






<!-- ESTADISTICAS -->


<section class="cards">


<div class="card">

<h2 id="totalOfertas">
0
</h2>

<p>
Ofertas
</p>

</div>



<div class="card">

<h2 id="totalClicks">
0
</h2>

<p>
Clics
</p>

</div>



<div class="card">

<h2 id="ahorroTotal">
$0
</h2>

<p>
Ahorro comunidad
</p>

</div>



</section>







<!-- PUBLICAR OFERTA -->


<section class="panel">


<h2>
🚀 Publicar Oferta
</h2>



<input id="titulo"
placeholder="Título del producto">



<select id="categoria">

<option>
Gaming
</option>

<option>
Tecnología
</option>

<option>
Celulares
</option>

<option>
Hogar
</option>

<option>
Juguetes
</option>

<option>
Moda
</option>


</select>




<input id="precioAntes"
placeholder="Precio antes">


<input id="precioFinal"
placeholder="Precio final">


<input id="descuento"
placeholder="Descuento %">



<input id="link"
placeholder="Link Mercado Libre">





<label class="upload">

📷 Subir imagen

<input 
type="file"
id="imagen"
accept="image/*">

</label>



<img id="preview">





<select id="estado">

<option value="true">
🟢 Activa
</option>


<option value="false">
🔴 Agotada
</option>


</select>





<select id="destacada">


<option value="false">
Normal
</option>


<option value="true">
⭐ Destacada
</option>


</select>




<button id="publicar">

🚀 PUBLICAR OFERTA

</button>




<p id="mensaje"></p>



</section>









<!-- CUPONES -->


<section class="panel">


<h2>
🎟️ Crear Cupón
</h2>



<input id="codigoCupon"
placeholder="Código cupón">



<select id="tipoCupon">


<option value="relampago">
⚡ Relámpago
</option>


<option value="bancario">
🏦 Bancario
</option>


<option value="exclusivo">
💎 Meli+
</option>


</select>




<input id="descuentoCupon"
placeholder="Descuento">



<input id="minimoCupon"
placeholder="Compra mínima">



<select id="estadoCupon">


<option value="activo">
🟢 Activo
</option>


<option value="agotando">
🟠 Por agotarse
</option>


<option value="agotado">
🔴 Agotado
</option>


</select>



<button id="guardarCupon">

🎟️ Guardar cupón

</button>



</section>









<!-- LISTADO -->


<section class="panel">


<h2>
📦 Ofertas publicadas
</h2>


<div id="listaOfertas">

Cargando...

</div>



</section>






</main>


</div>







<script type="module" src="admin.js"></script>


</body>

</html>
