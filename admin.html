<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Admin PRO | El Patrón de las Ofertas</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="admin.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="app">

<!-- SIDEBAR -->

<aside class="sidebar">

<div class="brand">

<div class="logo">
⚡
</div>

<h2>
El Patrón
</h2>

<span>
ADMIN PRO
</span>

</div>

<nav>

<button class="menuItem activo" data-panel="dashboard">

🏠
<span>Dashboard</span>

</button>

<button class="menuItem" data-panel="ofertas">

🛒
<span>Ofertas</span>

</button>

<button class="menuItem" data-panel="cupones">

🎟️
<span>Cupones</span>

</button>

<button class="menuItem" data-panel="categorias">

📂
<span>Categorías</span>

</button>

<button class="menuItem" data-panel="usuarios">

👤
<span>Usuarios</span>

</button>

<button class="menuItem" data-panel="estadisticas">

📊
<span>Estadísticas</span>

</button>

<button class="menuItem" data-panel="configuracion">

⚙️
<span>Configuración</span>

</button>

</nav>

<div class="bottomMenu">

<button id="salir">

🚪
Cerrar sesión

</button>

</div>

</aside>

<!-- CONTENIDO -->

<main class="contenido">

<header class="topbar">

<div>

<h1>
Dashboard
</h1>

<p>
Bienvenido al centro de control.
</p>

</div>

<div class="accionesTop">

<button id="nuevaOferta">

➕ Nueva oferta

</button>

</div>

</header>

<section class="cards">

<div class="card">

<span>
🛒
</span>

<h3 id="totalOfertas">

0

</h3>

<p>
Ofertas publicadas
</p>

</div>

<div class="card">

<span>
👁️
</span>

<h3 id="totalClicks">

0

</h3>

<p>
Clics totales
</p>

</div>

<div class="card">

<span>
👥
</span>

<h3 id="usuariosOnline">

0

</h3>

<p>
Usuarios conectados
</p>

</div>

<div class="card">

<span>
🏆
</span>

<h3 id="topOferta">

-

</h3>

<p>
Oferta más vista
</p>

</div>

</section>

<section class="panel">

<h2>
📈 Rendimiento
</h2>

<canvas id="graficaClicks"></canvas>

</section>

<section id="contenedorPaneles">

<section id="panelOfertas" class="panel">

<h2>

🛒 Gestión de Ofertas

</h2>

<div class="formGrid">

<div class="campo">

<label>

Título

</label>

<input
id="titulo"
type="text"
placeholder="Ej. Nintendo Switch OLED">

</div>

<div class="campo">

<label>

Categoría

</label>

<select id="categoria">

<option>Tecnología</option>

<option>Gaming</option>

<option>Celulares</option>

<option>Hogar</option>

<option>Moda</option>

<option>Juguetes</option>

<option>Belleza</option>

<option>Supermercado</option>

</select>

</div>

<div class="campo">

<label>

Precio antes

</label>

<input
id="precioAntes"
type="text"
placeholder="$5,999">

</div>

<div class="campo">

<label>

Precio final

</label>

<input
id="precioFinal"
type="text"
placeholder="$4,799">

</div>

<div class="campo">

<label>

Descuento

</label>

<input
id="descuento"
type="text"
placeholder="20% OFF">

</div>

<div class="campo">

<label>

Link Mercado Libre

</label>

<input
id="link"
type="url"
placeholder="https://...">

</div>

<div class="campo">

<label>

Imagen

</label>

<input
type="file"
id="archivoImagen"
accept="image/*">

</div>

<div class="campo">

<label>

Vista previa

</label>

<img
id="vistaImagen"
class="preview">

</div>

<div class="campo">

<label>

Estado

</label>

<select id="estado">

<option value="true">

🟢 Activa

</option>

<option value="false">

🔴 Agotada

</option>

</select>

</div>

<div class="campo">

<label>

Destacada

</label>

<select id="destacada">

<option value="false">

No

</option>

<option value="true">

Sí

</option>

</select>

</div>

</div>

<div class="accionesFormulario">

<button id="publicar" class="btnPrincipal">

🚀 Publicar oferta

</button>

<button id="guardarCambios" class="btnSecundario">

💾 Guardar cambios

</button>

<button id="cancelarEdicion" class="btnCancelar">

❌ Cancelar

</button>

</div>

</section>

<section class="panel">

<h2>

📦 Ofertas publicadas

</h2>

<div id="listaOfertas">

Cargando ofertas...

</div>

</section>

</section>

</main>

</div>

<script type="module" src="admin.js"></script>

</body>

</html>
