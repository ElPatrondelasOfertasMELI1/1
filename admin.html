<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
⚡ Admin PRO | El Patrón
</title>



<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">


<link rel="stylesheet" href="admin.css">


</head>


<body>





<header class="adminHeader">


<div class="logo">

⚡ ADMIN

<span>
EL PATRÓN
</span>

</div>



<button id="salir">

SALIR

</button>



</header>








<main class="dashboard">





<h1>

🚀 Panel Administrador PRO

</h1>





<section class="stats">



<div class="cardStat">

<h3>
🔥 Ofertas
</h3>

<strong id="totalOfertas">

0

</strong>

</div>





<div class="cardStat">

<h3>
👆 Clics
</h3>

<strong id="totalClicks">

0

</strong>

</div>







<div class="cardStat">

<h3>
🟢 Estado
</h3>

<strong>

Activo

</strong>

</div>



</section>









<section class="panel">



<h2>

➕ Publicar nueva oferta

</h2>





<input

id="titulo"

placeholder="Nombre del producto">





<input

id="imagen"

placeholder="URL imagen">


<input

id="precioAntes"

placeholder="Precio anterior">





<input

id="precioFinal"

placeholder="Precio final">





<input

id="descuento"

placeholder="Ejemplo: 30% OFF">





<input

id="link"

placeholder="Link Mercado Libre">







<button id="publicar">

🔥 PUBLICAR OFERTA

</button>





</section>









<section class="panel">


<h2>

📦 Ofertas publicadas

</h2>



<div id="listaOfertas">


Cargando ofertas...


</div>



</section>









<section class="panel">


<h2>

🎟️ Gestión de cupones

</h2>



<button class="tipo">

⚡ Relámpago

</button>


<button class="tipo">

💳 Bancarios

</button>


<button class="tipo">

⭐ Meli+

</button>



</section>









<script type="module" src="admin.js"></script>

</html>
