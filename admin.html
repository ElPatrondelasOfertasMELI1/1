<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">


<title>
⚡ Admin | El Patrón de las Ofertas
</title>


<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">


<link rel="stylesheet" href="admin.css">


</head>


<body>



<div class="admin">



<header class="admin-header">


<div>

<h1>

⚡ EL PATRÓN

</h1>


<p>

Panel de administración PRO

</p>


</div>



<button id="salir">

Salir

</button>



</header>








<!-- ESTADISTICAS -->


<section class="stats">


<div class="stat">

<h3 id="totalClicks">

0

</h3>

<p>

Clics

</p>

</div>



<div class="stat">

<h3 id="ahorro">

$0

</h3>

<p>

Ahorro comunidad

</p>

</div>



<div class="stat">

<h3 id="usuarios">

0

</h3>

<p>

Usuarios

</p>

</div>



</section>










<!-- OFERTAS -->


<section class="panel">


<h2>

🚨 Publicar oferta

</h2>



<input id="titulo"

placeholder="Nombre del producto">



<input id="precioAntes"

placeholder="Precio anterior">



<input id="precioFinal"

placeholder="Precio final">



<input id="link"

placeholder="Link Mercado Libre">





<label>

📷 Imagen del producto

</label>



<input 

type="file"

id="imagen"

accept="image/*">






<img id="preview"

class="preview"

src="">






<button id="publicar">

🚀 PUBLICAR OFERTA

</button>



<p id="mensaje">

</p>



</section>









<!-- LISTA OFERTAS -->


<section class="panel">


<h2>

📦 Ofertas publicadas

</h2>


<div id="listaOfertas">

Cargando...

</div>


</section>









<!-- CUPONES -->


<section class="panel">


<h2>

🎟️ Crear cupón

</h2>




<input id="codigoCupon"

placeholder="Código cupón">


<input id="descuento"

placeholder="Descuento">


<input id="minimo"

placeholder="Compra mínima">



<select id="estado">


<option value="activo">

🟢 Activo

</option>


<option value="agotando">

🟠 Por agotarse

</option>



<option value="agotado">

🔴 Agotado

</option>


</select>





<button id="guardarCupon">

Guardar cupón

</button>



</section>









<section class="panel">


<h2>

🎟️ Cupones actuales

</h2>



<div id="listaCupones">

Cargando...

</div>



</section>







</div>








<script type="module" src="admin.js"></script>


</body>

</html>
