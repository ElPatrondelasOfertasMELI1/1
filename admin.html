<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
⚡ Admin PRO | El Patrón de las Ofertas
</title>


<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">


<link rel="stylesheet" href="admin.css">


</head>



<body>



<div class="admin">



<header class="admin-header">


<div>

<h1>

⚡ EL PATRÓN

</h1>


<p>

Panel PRO

</p>


</div>


<button id="logout">

Salir

</button>


</header>







<!-- LOGIN -->


<section id="loginBox" class="panel">


<h2>

🔐 Acceso administrador

</h2>


<input id="email"

placeholder="Correo">


<input id="password"

type="password"

placeholder="Contraseña">



<button id="login">

ENTRAR

</button>


</section>









<!-- PANEL -->


<div id="panelAdmin" style="display:none;">








<!-- ESTADISTICAS -->


<section class="stats">


<div class="stat">

<b id="statClicks">

0

</b>

<p>

Clics

</p>

</div>



<div class="stat">

<b id="statCopias">

0

</b>

<p>

Copias

</p>

</div>



<div class="stat">

<b id="statAhorro">

$0

</b>

<p>

Ahorro

</p>

</div>


</section>









<!-- OFERTAS -->


<section class="panel">


<h2>

🔥 Ofertas

</h2>



<input id="ofertaId" type="hidden">



<input id="titulo"

placeholder="Nombre producto">



<input id="precioAntes"

placeholder="Precio anterior">



<input id="precioFinal"

placeholder="Precio final">



<input id="link"

placeholder="Link Mercado Libre">






<label>

📷 Imagen

</label>



<input id="imagen"

type="file"

accept="image/*">





<img id="preview"

class="preview">





<label class="check">


<input id="destacada"

type="checkbox">


⭐ Oferta destacada


</label>





<button id="guardarOferta">

🚀 PUBLICAR / GUARDAR

</button>



</section>









<section class="panel">


<h2>

📦 Ofertas publicadas

</h2>



<div id="listaOfertas">

</div>



</section>









<!-- CUPONES -->


<section class="panel">


<h2>

🎟️ Crear / Editar Cupón

</h2>



<input id="cuponId"

placeholder="Código cupón">



<input id="cuponDescuento"

placeholder="Descuento">



<input id="cuponMinimo"

placeholder="Compra mínima">





<select id="cuponTipo">


<option value="relampago">

⚡ Relámpago

</option>



<option value="bancario">

💳 Bancario

</option>



<option value="meli">

💎 Meli+

</option>


</select>





<select id="cuponEstado">


<option value="activo">

🟢 Activo

</option>



<option value="agotando">

🟠 Por agotarse

</option>



<option value="agotado">

🔴 Agotado

</option>



</select>






<button id="guardarCupon">

💾 GUARDAR CUPÓN

</button>



</section>









<section class="panel">


<h2>

⚡ Cupones Relámpago

</h2>


<div id="listaRelampago">

</div>



</section>







<section class="panel">


<h2>

💳 Cupones Bancarios

</h2>



<div id="listaBancarios">

</div>



</section>







<section class="panel">


<h2>

💎 Cupones Exclusivos Meli+

</h2>



<div id="listaMeli">

</div>



</section>








</div>


</div>






<script type="module" src="admin.js"></script>


</body>

</html>
