<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>⚡ Admin PRO | El Patrón de las Ofertas</title>


<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet">


<link rel="stylesheet" href="admin.css">


</head>


<body>


<div class="app">



<!-- MENU LATERAL -->

<aside class="sidebar">


<div class="marca">

<div class="logo">
⚡
</div>

<h2>
El Patrón
</h2>

<span>
ADMIN PRO
</span>

</div>



<button class="menuActivo">
🏠 Dashboard
</button>


<button>
🛒 Ofertas
</button>


<button>
🎟️ Cupones
</button>


<button>
📊 Estadísticas
</button>



<button id="salir">

🚪 Salir

</button>



</aside>







<main class="contenido">



<header>

<h1>
Dashboard
</h1>

<p>
Centro de control de El Patrón de las Ofertas
</p>


</header>







<!-- ESTADISTICAS -->


<section class="tarjetas">


<div class="tarjeta">

<h2 id="totalOfertas">
0
</h2>

<p>
Ofertas
</p>

</div>



<div class="tarjeta">

<h2 id="totalClicks">
0
</h2>

<p>
Clics
</p>

</div>



<div class="tarjeta">

<h2 id="ahorroTotal">
$0
</h2>

<p>
Ahorro comunidad
</p>

</div>


</section>








<!-- PUBLICAR OFERTA -->


<section class="panel">


<h2>
🚀 Publicar oferta
</h2>



<div class="formulario">



<input 
id="titulo"
placeholder="Título oferta">



<select id="categoria">


<option>
Gaming
</option>


<option>
Tecnología
</option>


<option>
Celulares
</option>


<option>
Hogar
</option>


<option>
Moda
</option>


<option>
Juguetes
</option>


</select>




<input
id="precioAntes"
placeholder="Precio antes">



<input
id="precioFinal"
placeholder="Precio final">



<input
id="descuento"
placeholder="Descuento">



<input
id="link"
placeholder="Link Mercado Libre">





<label class="subir">


📷 Seleccionar imagen


<input

type="file"

id="imagenArchivo"

accept="image/*"

hidden>


</label>





<img 
id="vistaImagen"
class="preview">





<select id="activo">


<option value="true">
🟢 Activa
</option>


<option value="false">
🔴 Agotada
</option>


</select>




<select id="destacada">


<option value="false">
Normal
</option>


<option value="true">
⭐ Destacada
</option>


</select>



</div>





<button id="publicarOferta">

🚀 PUBLICAR OFERTA

</button>



<p id="mensajeOferta"></p>



</section>










<!-- CUPONES -->


<section class="panel">


<h2>
🎟️ Administrar cupones
</h2>



<button id="nuevoCupon">

➕ Nuevo cupón

</button>




<div id="listaCupones">

Cargando...

</div>



</section>









<!-- OFERTAS EXISTENTES -->


<section class="panel">


<h2>

🛒 Ofertas publicadas

</h2>



<div id="listaOfertas">

Cargando...

</div>



</section>









</main>


</div>






<script type="module" src="admin.js"></script>


</body>

</html>
