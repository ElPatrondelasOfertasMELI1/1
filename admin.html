<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
Admin PRO | El Patrón de las Ofertas
</title>


<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">


<link rel="stylesheet" href="admin.css">


<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>


</head>



<body>


<div class="app">



<!-- MENU LATERAL -->


<aside class="sidebar">


<div class="brand">


<div class="logo">
⚡
</div>


<h2>
El Patrón
</h2>


<span>
ADMIN PRO
</span>


</div>





<button class="menuItem activo">

🏠 Dashboard

</button>



<button class="menuItem">

🛒 Ofertas

</button>




<button class="menuItem">

🎟️ Cupones

</button>




<button class="menuItem">

📊 Estadísticas

</button>





<button id="salir">

🚪 Cerrar sesión

</button>



</aside>









<main class="contenido">



<header class="topbar">


<h1>
Dashboard PRO
</h1>


<p>
Control total de El Patrón de las Ofertas
</p>


</header>









<!-- ESTADISTICAS -->


<section class="cards">


<div class="card">

<h3 id="totalOfertas">
0
</h3>

<p>
Ofertas
</p>

</div>




<div class="card">

<h3 id="totalClicks">
0
</h3>

<p>
Clics
</p>

</div>





<div class="card">

<h3 id="ahorroTotal">
$0
</h3>

<p>
Ahorro comunidad
</p>

</div>



</section>









<!-- PUBLICAR OFERTA -->


<section class="panel">


<h2>
🚀 Nueva Oferta
</h2>




<div class="formGrid">



<input
id="titulo"
placeholder="Título de oferta">





<select id="categoria">

<option>
Gaming
</option>

<option>
Tecnología
</option>

<option>
Celulares
</option>

<option>
Hogar
</option>

<option>
Juguetes
</option>

<option>
Moda
</option>

</select>







<input
id="precioAntes"
placeholder="Precio antes">






<input
id="precioFinal"
placeholder="Precio final">






<input
id="descuento"
placeholder="Descuento %">





<input
id="link"
placeholder="Link Mercado Libre">





<!-- IMAGEN -->


<label class="subirImagen">


📸 Elegir imagen


<input
type="file"
id="imagenArchivo"
accept="image/*"
>


</label>





<img
id="previewImagen"
class="preview"
>







<select id="estado">


<option value="true">

🟢 Activa

</option>


<option value="false">

🔴 Agotada

</option>


</select>







<select id="destacada">


<option value="false">

No destacada

</option>


<option value="true">

⭐ Destacada

</option>


</select>



</div>






<button
id="publicar"
class="btnPrincipal"
>


🚀 Publicar Oferta


</button>





<p id="mensaje"></p>



</section>









<!-- CUPONES -->


<section class="panel">


<h2>
🎟️ Administrar Cupones
</h2>



<div class="formGrid">


<input
id="codigoCupon"
placeholder="Código cupón">



<input
id="descuentoCupon"
placeholder="Descuento">


<input
id="minimoCupon"
placeholder="Compra mínima">





<select id="tipoCupon">


<option value="relampago">

⚡ Relámpago

</option>


<option value="bancario">

🏦 Bancario

</option>


<option value="exclusivo">

💎 Meli+

</option>



</select>





<select id="estadoCupon">


<option value="activo">

🟢 Activo

</option>


<option value="agotando">

🟠 Por agotarse

</option>


<option value="agotado">

🔴 Agotado

</option>


</select>



</div>






<button
id="guardarCupon"
class="btnPrincipal"
>


🎟️ Guardar Cupón


</button>




</section>









<!-- LISTADOS -->


<section class="panel">


<h2>
📦 Ofertas publicadas
</h2>



<div id="listaOfertas">

Cargando...

</div>




</section>






<section class="panel">


<h2>
🎟️ Cupones publicados
</h2>



<div id="listaCupones">

Cargando...

</div>



</section>






</main>




</div>








<script type="module" src="admin.js"></script>


</body>

</html>
