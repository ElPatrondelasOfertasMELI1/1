<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin PRO | El Patrón de las Ofertas</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="admin.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>


<body>


<div class="app">


<!-- SIDEBAR -->

<aside class="sidebar">


<div class="brand">

<div class="logo">
⚡
</div>

<h2>
El Patrón
</h2>

<span>
ADMIN PRO
</span>

</div>



<nav>


<button class="menuItem activo">

🏠 Dashboard

</button>


<button class="menuItem">

🛒 Ofertas

</button>


<button class="menuItem">

🎟️ Cupones

</button>


<button class="menuItem">

📊 Estadísticas

</button>


</nav>



<button id="salir">

🚪 Cerrar sesión

</button>



</aside>





<!-- CONTENIDO -->


<main class="contenido">



<header class="topbar">


<div>

<h1>
Dashboard
</h1>


<p>
Centro de control de ofertas
</p>


</div>



</header>





<!-- TARJETAS -->


<section class="cards">


<div class="card">

<h3 id="totalOfertas">
0
</h3>

<p>
Ofertas publicadas
</p>

</div>




<div class="card">

<h3 id="totalClicks">
0
</h3>

<p>
Clics totales
</p>

</div>




<div class="card">

<h3 id="topOferta">
-
</h3>

<p>
Más vista
</p>

</div>



</section>






<section class="panel">


<h2>
📈 Rendimiento
</h2>


<canvas id="graficaClicks"></canvas>


</section>








<!-- FORMULARIO -->


<section class="panel">


<button id="publicar" class="btnPrincipal">

🚀 Publicar oferta

</button>


<div class="formGrid">



<input
id="titulo"
placeholder="Título oferta">



<select id="categoria">

<option value="Tecnología">
Tecnología
</option>

<option value="Gaming">
Gaming
</option>

<option value="Celulares">
Celulares
</option>

<option value="Hogar">
Hogar
</option>

<option value="Moda">
Moda
</option>

<option value="Juguetes">
Juguetes
</option>


</select>





<input
id="precioAntes"
placeholder="Precio antes">





<input
id="precioFinal"
placeholder="Precio final">





<input
id="descuento"
placeholder="Descuento">





<input
id="link"
placeholder="Link Mercado Libre">






<input
type="file"
id="archivoImagen"
accept="image/*">





<img
id="vistaImagen"
class="preview">





<select id="estado">


<option value="true">

🟢 Activa

</option>


<option value="false">

🔴 Agotada

</option>


</select>





<select id="destacada">


<option value="false">

No destacada

</option>


<option value="true">

⭐ Destacada

</option>


</select>




</div>







<!-- BARRA CARGA -->


<div id="barraCarga" style="display:none">


<div id="progresoCarga"></div>


</div>



<p id="estadoSubida"></p>



</section>









<!-- BUSCADOR -->


<section class="panel">


<h2>
📦 Ofertas publicadas
</h2>




<input
id="buscarOferta"
placeholder="🔍 Buscar oferta">





<select id="filtroCategoria">


<option value="todas">

Todas

</option>


<option value="Tecnología">

Tecnología

</option>


<option value="Gaming">

Gaming

</option>


<option value="Celulares">

Celulares

</option>


<option value="Hogar">

Hogar

</option>


</select>






<select id="ordenarOferta">


<option value="reciente">

Más recientes

</option>



<option value="clics">

Más vistas

</option>



<option value="destacadas">

Destacadas

</option>



</select>






<div id="listaOfertas">

Cargando...

</div>



</section>







</main>


</div>





<script type="module" src="admin.js"></script>


</body>

</html>
