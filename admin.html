<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">


<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
⚡ Admin PRO | El Patrón
</title>



<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">



<link rel="stylesheet" href="admin.css">



</head>


<body>




<header class="adminHeader">


<div class="logo">

⚡ ADMIN

<span>
EL PATRÓN
</span>

</div>



<button id="salir">

SALIR

</button>


</header>









<main class="dashboard">







<h1>

🚀 Panel Administrador PRO

</h1>









<section class="stats">



<div class="cardStat">

<h3>

🔥 Ofertas

</h3>

<strong id="totalOfertas">

0

</strong>


</div>






<div class="cardStat">

<h3>

🎟️ Cupones

</h3>


<strong id="totalCupones">

0

</strong>


</div>






<div class="cardStat">

<h3>

👆 Copias

</h3>


<strong id="totalCopias">

0

</strong>


</div>


</section>









<!-- =====================
 NUEVA OFERTA
===================== -->



<section class="panel">



<h2>

🔥 Publicar Oferta

</h2>






<input

id="titulo"

placeholder="Título del producto"

>






<input

id="imagen"

type="file"

accept="image/*"

>






<img

id="preview"

class="preview"

>







<input

id="precioAntes"

placeholder="Precio antes"

>






<input

id="precioFinal"

placeholder="Precio final"

>






<input

id="descuento"

placeholder="Ejemplo: 30% OFF"

>






<input

id="link"

placeholder="Link Mercado Libre"

>









<h3>

Tipo de oferta

</h3>





<select id="tipoOferta">



<option value="normal">

Normal

</option>



<option value="relampago">

⚡ Relámpago

</option>



<option value="destacada">

⭐ Destacada

</option>



</select>








<button id="publicar">

🔥 PUBLICAR OFERTA

</button>







</section>









<!-- =====================
 OFERTAS ACTUALES
===================== -->



<section class="panel">



<h2>

📦 Ofertas publicadas

</h2>




<div id="listaOfertas">

Cargando...

</div>





</section>









<!-- =====================
 CUPONES
===================== -->



<section class="panel">



<h2>

🎟️ Crear Cupón

</h2>







<input

id="codigoCupon"

placeholder="Código del cupón"

>






<input

id="nombreCupon"

placeholder="Nombre visible"

>






<input

id="descuentoCupon"

placeholder="Descuento"

>







<input

id="minimoCupon"

placeholder="Compra mínima"

>







<select id="tipoCupon">


<option value="relampago">

⚡ Relámpago

</option>



<option value="bancario">

💳 Bancario

</option>




<option value="exclusivo">

⭐ Exclusivo

</option>


</select>









<button id="crearCupon">

🎟️ GUARDAR CUPÓN

</button>







</section>









<section class="panel">



<h2>

🎟️ Cupones actuales

</h2>



<div id="listaCupones">

Cargando...

</div>



</section>








</main>









<script type="module" src="admin.js"></script>



</body>


</html>
